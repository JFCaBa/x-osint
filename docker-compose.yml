services:
  x-osint:
    build: .
    image: x-osint
    ports:
      - "8080:8080"
    environment:
      X_OSINT_PASSWORD: "${X_OSINT_PASSWORD:-changeme}"
      POLL_INTERVAL_MIN: "5"
      RETENTION_DAYS: "30"
      OLLAMA_HOST: http://ollama:11434
      AI_MODEL: ${AI_MODEL:-gemma3:4b}
      AI_SUMMARIZE_MODEL: ${AI_SUMMARIZE_MODEL:-gemma3:4b}
      REPORT_TZ: ${REPORT_TZ:-Europe/London}
    volumes:
      - x-data:/data
    restart: unless-stopped
    depends_on:
      - ollama
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-models:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
  # One-shot: pulls the model into the shared volume on `up`, then exits.
  # The app keeps running meanwhile and starts classifying once the model lands.
  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
      AI_MODEL: ${AI_MODEL:-gemma3:4b}
      AI_SUMMARIZE_MODEL: ${AI_SUMMARIZE_MODEL:-gemma3:4b}
    entrypoint: ["/bin/sh", "-c", "ollama pull \"$AI_MODEL\" && ollama pull \"$AI_SUMMARIZE_MODEL\""]
    restart: "no"

volumes:
  x-data:
  ollama-models:
